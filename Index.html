function App(){
  const [lang,setLang]=useState("en");
  const [tab,setTab]=useState("report");
  const [branch,setBranch]=useState("All");
  const [status,setStatus]=useState("All");
  const [sortBy,setSortBy]=useState("score");
  const [search,setSearch]=useState("");
  const t=T[lang];
  const statuses=lang==='tl'?STATUSES_TL:STATUSES_EN;

  const activeStatuses=STATUSES_EN;
  const filtered=barbers
    .filter(b=>branch==="All"||b.branch===branch)
    .filter(b=>status==="All"||(lang==='tl'?STATUSES_TL[STATUSES_EN.indexOf(status)]:status)===status||b.status===activeStatuses[statuses.indexOf(status)])
    .filter(b=>status==="All"||b.status===(lang==='tl'?STATUSES_EN[STATUSES_TL.indexOf(status)]:status)||b.status===status)
    .filter(b=>b.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b2)=>{
      if(sortBy==="score")return(b2.a2Score||b2.a1Score||0)-(a.a2Score||a.a1Score||0);
      if(sortBy==="name")return a.name.localeCompare(b2.name);
      if(sortBy==="improvement")return(b2.improvement||0)-(a.improvement||0);
      return 0;
    });

  const gear2c=barbers.filter(b=>(b.a2Gear||b.a1Gear)==="Gear 2").length;
  const gear3c=barbers.filter(b=>(b.a2Gear||b.a1Gear)==="Gear 3").length;
  const gear1c=barbers.filter(b=>(b.a2Gear||b.a1Gear)==="Gear 1").length;
  const standouts=barbers.filter(b=>b.status==="Standout").length;
  const onWatch=barbers.filter(b=>b.status==="On Watch").length;
  const scored=barbers.filter(b=>(b.a2Score||b.a1Score)>0);
  const avgScore=(scored.reduce((s,b)=>s+(b.a2Score||b.a1Score||0),0)/scored.length).toFixed(1);

  const btn=(active)=>({padding:"5px 12px",fontSize:11,letterSpacing:1,background:active?"#c8a96e":"transparent",color:active?"#0a0a0a":"#666",border:`1px solid ${active?"#c8a96e":"#2a2a2a"}`,borderRadius:2,cursor:"pointer"});

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",color:"#f0ece4",padding:"32px 28px"}}>
      {/* Top bar: brand + language toggle */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#c8a96e",textTransform:"uppercase"}}>{t.brand}</div>
        <div className="lang-toggle">
          <button className={`lang-btn${lang==="en"?" active":""}`} onClick={()=>{setLang("en");setStatus("All")}}>🇺🇸 EN</button>
          <button className={`lang-btn${lang==="tl"?" active":""}`} onClick={()=>{setLang("tl");setStatus("Lahat")}}>🇵🇭 TL</button>
        </div>
      </div>

      {/* Header */}
      <div style={{marginBottom:28,borderBottom:"1px solid #1a1a1a",paddingBottom:24}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:20}}>
          <div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:600,color:"#f0ece4",letterSpacing:0.5}}>{t.title}</h1>
            <p style={{fontSize:12,color:"#555",marginTop:6}}>{t.subtitle}</p>
          </div>
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            {[{l:t.total,v:barbers.length,c:"#f0ece4"},{l:t.avgScore,v:avgScore,c:"#c8a96e"},{l:t.gear2p,v:gear2c,c:"#5ab4f0"},{l:t.gear3,v:gear3c,c:"#55f0b4"},{l:t.standout,v:standouts,c:"#22c55e"},{l:t.onWatch,v:onWatch,c:"#eab308"}].map(({l,v,c})=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontFamily:"monospace",fontSize:20,color:c,fontWeight:700}}>{v}</div>
                <div style={{fontSize:9,color:"#444",letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Gear bar */}
        <div style={{marginTop:16,display:"flex",gap:3,height:6,borderRadius:3,overflow:"hidden"}}>
          <div style={{flex:gear1c,background:"#c97c2a",opacity:0.7}} title={`Gear 1: ${gear1c}`}/>
          <div style={{flex:gear2c,background:"#2a7cc9",opacity:0.9}} title={`Gear 2: ${gear2c}`}/>
          <div style={{flex:Math.max(gear3c,0.01),background:"#2ac97c"}} title={`Gear 3: ${gear3c}`}/>
        </div>
        <div style={{display:"flex",gap:16,marginTop:6,flexWrap:"wrap"}}>
          <span style={{fontSize:10,color:"#c97c2a"}}>● Gear 1: {gear1c}</span>
          <span style={{fontSize:10,color:"#2a7cc9"}}>● Gear 2: {gear2c}</span>
          <span style={{fontSize:10,color:"#2ac97c"}}>● Gear 3: {gear3c}</span>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:0,borderBottom:"1px solid #333"}}>
        <button className={`tab-btn${tab==="report"?" active":""}`} onClick={()=>setTab("report")}>{t.tabReport}</button>
        <button className={`tab-btn${tab==="rubric"?" active":""}`} onClick={()=>setTab("rubric")}>{t.tabRubric}</button>
      </div>

      {/* REPORT TAB */}
      <div className={`tab-content${tab==="report"?" active":""}`} style={{paddingTop:24}}>
        {/* Filters */}
        <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder={t.search} value={search} onChange={e=>setSearch(e.target.value)}
            style={{background:"#111",border:"1px solid #222",color:"#f0ece4",padding:"5px 12px",borderRadius:2,fontSize:12,outline:"none",width:160}}/>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {BRANCHES.map(b=><button key={b} style={btn(branch===b)} onClick={()=>setBranch(b)}>{b}</button>)}
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {statuses.map(s=><button key={s} style={btn(status===s)} onClick={()=>setStatus(s)}>{s}</button>)}
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:3,alignItems:"center"}}>
            <span style={{fontSize:10,color:"#444",letterSpacing:1}}>{t.sortLabel}</span>
            {[[t.sortScore,"score"],[t.sortName,"name"],[t.sortImp,"improvement"]].map(([l,v])=>(
              <button key={v} style={btn(sortBy===v)} onClick={()=>setSortBy(v)}>{l}</button>
            ))}
          </div>
        </div>

        {/* Legend */}
        <div style={{display:"flex",gap:14,marginBottom:16,padding:"9px 14px",background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:2,flexWrap:"wrap"}}>
          <span style={{fontSize:10,color:"#555"}}>{t.barsNote}</span>
        </div>

        <div style={{fontSize:11,color:"#444",marginBottom:12}}>{t.showing} {filtered.length} {t.of} {barbers.length} {t.barbers}</div>
        {filtered.map(b=><BarberCard key={b.name+b.branch} b={b} t={t} lang={lang}/>)}
      </div>

      {/* RUBRIC TAB */}
      <div className={`tab-content${tab==="rubric"?" active":""}`}>
        <RubricTab t={t} lang={lang}/>
      </div>

      <div style={{marginTop:36,borderTop:"1px solid #1a1a1a",paddingTop:16,fontSize:10,color:"#2a2a2a",letterSpacing:0.5,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <span>Felipe & Sons · Barber Assessment System</span>
        <span>{t.gearFooter}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
